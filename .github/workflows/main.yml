name: Daily Playwright Automation Tests

on:
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Added working-directory pointing to Demo-Opencart
      - name: Install Playwright Browsers
        working-directory: ./Demo-Opencart
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      # Step 4: Added working-directory pointing to Demo-Opencart
      - name: Run Tests
        working-directory: ./Demo-Opencart
        run: mvn clean test
        continue-on-error: true

      # Step 5: Updated paths to look inside Demo-Opencart folder for the reports
      - name: Upload Detailed Test Report
        uses: actions/upload-artifact@v4
        with:
          name: detailed-test-report
          path: |
            Demo-Opencart/target/surefire-reports/
            Demo-Opencart/target/playwright-traces/
          retention-days: 7
