name: OpenCart Playwright CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  test:
    name: Playwright TestNG Suite
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Show pom.xml for debug (helps catch dependency issues) ─────────
      - name: Print pom.xml
        run: cat pom.xml

      # ── 4. Download all dependencies ──────────────────────────────────────
      - name: Resolve Maven dependencies
        run: mvn dependency:resolve -B

      # ── 5. Install Playwright browsers ────────────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers + OS deps
        run: |
          PLAYWRIGHT_VERSION=$(mvn help:evaluate -Dexpression=project.properties 2>/dev/null | grep -A1 'playwright' | tail -1 || echo "")
          mvn exec:java -e \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium" \
            -B

      # ── 6. Run TestNG tests ───────────────────────────────────────────────
      - name: Run tests
        run: mvn test -B
        env:
          BASE_URL: "https://demo.opencart.com"
          HEADLESS: "true"
        continue-on-error: true

      # ── 7. Upload ExtentReport ────────────────────────────────────────────
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: |
            reports/
            ExtentReports/
            test-output/ExtentReport*.html
            ExtentReport*.html
          if-no-files-found: warn
          retention-days: 30

      # ── 8. Upload Surefire XML ────────────────────────────────────────────
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14

      # ── 9. Upload screenshots on failure ──────────────────────────────────
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/
            test-output/screenshots/
          if-no-files-found: warn
          retention-days: 7
