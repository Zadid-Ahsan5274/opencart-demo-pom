name: OpenCart Playwright CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: Demo-Opencart   # pom.xml lives here

jobs:
  test:
    name: Playwright TestNG Suite
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Resolve Maven dependencies ────────────────────────────────────
      - name: Resolve dependencies
        run: mvn dependency:resolve -B

      # ── 4. Cache + Install Playwright browsers ────────────────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Demo-Opencart/pom.xml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers + OS deps
        run: |
          mvn exec:java -e \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium" \
            -B

      # ── 5. Run TestNG tests ───────────────────────────────────────────────
      - name: Run tests
        run: mvn test -B
        env:
          BASE_URL: "https://demo.opencart.com"
          HEADLESS: "true"
        continue-on-error: true

      # ── 6. Upload ExtentReport ────────────────────────────────────────────
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: Demo-Opencart/test-output/
          if-no-files-found: warn
          retention-days: 30

      # ── 7. Upload screenshots ─────────────────────────────────────────────
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: Demo-Opencart/screenshot/
          if-no-files-found: warn
          retention-days: 14

      # ── 8. Upload Surefire XML ────────────────────────────────────────────
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: Demo-Opencart/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
