name: OpenCart Playwright CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  test:
    name: Playwright TestNG Suite
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build project first (downloads all Maven deps incl. Playwright) ─
      - name: Build with Maven (skip tests)
        run: mvn clean install -DskipTests -B

      # ── 4. Install Playwright browsers ───────────────────────────────────
      #    After mvn install, the playwright-java jar is in ~/.m2.
      #    We use the CLI class that ships inside it.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers + OS deps
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium" -B
        # If the above still fails, uncomment this alternative:
        # run: java -cp $(mvn dependency:build-classpath -Dmdep.outputFile=/dev/stdout -q) com.microsoft.playwright.CLI install --with-deps chromium

      # ── 5. Run TestNG tests ───────────────────────────────────────────────
      - name: Run tests
        run: mvn test -B
        env:
          BASE_URL: "https://demo.opencart.com"
          HEADLESS: "true"
        continue-on-error: true    # ensures report upload runs even if tests fail

      # ── 6. Upload ExtentReport ────────────────────────────────────────────
      #    Adjust glob to match your actual report output path
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: |
            reports/
            ExtentReports/
            test-output/ExtentReport*.html
          if-no-files-found: warn
          retention-days: 30

      # ── 7. Upload Surefire XML + HTML ─────────────────────────────────────
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14

      # ── 8. Upload screenshots / videos on failure ─────────────────────────
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: |
            screenshots/
            test-output/screenshots/
          if-no-files-found: warn
          retention-days: 7

      # ── 9. Publish TestNG results summary on PR / Actions page ────────────
      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false     # don't fail the workflow if XML is missing
